name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
          pip install pyinstaller
      - name: Build .exe
        run: pyinstaller --onefile --windowed --name DoorsCounter DoorsCounter_windows.py
      - uses: actions/upload-artifact@v4
        with:
          name: DoorsCounter-windows
          path: dist/DoorsCounter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mac.txt
          pip install pyinstaller
      - name: Build .app
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name DoorsCounter \
            --osx-bundle-identifier org.beachlab.doorscounter \
            DoorsCounter.py
          cd dist && zip -r DoorsCounter-macos.zip DoorsCounter.app
      - uses: actions/upload-artifact@v4
        with:
          name: DoorsCounter-macos
          path: dist/DoorsCounter-macos.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DoorsCounter-windows/DoorsCounter.exe
            artifacts/DoorsCounter-macos/DoorsCounter-macos.zip
          generate_release_notes: true
